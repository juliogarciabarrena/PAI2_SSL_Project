# =============================================================
# config.properties — Configuración compartida SSL
# =============================================================

# Cipher suites habilitados (separados por coma) Canbiar según necesidades y compatibilidad
ssl.ciphersuites=TLS_AES_256_GCM_SHA384,TLS_CHACHA20_POLY1305_SHA256,TLS_AES_128_GCM_SHA256

# Protocolo TLS
ssl.protocol=TLSv1.3
